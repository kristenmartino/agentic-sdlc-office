name: Prompt Update
description: A change to an agent's system prompt.
title: "[Prompt]: "
labels: ["type:prompt", "area:agents"]
body:
  - type: dropdown
    id: agent
    attributes:
      label: Agent
      options:
        - Cora
        - Piper
        - Nova
        - Theo
        - Iris
        - Mira
        - Tess
        - Rune
        - Shared base
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What is the agent getting wrong, or what new capability is needed?
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Proposed change
      description: Summary of the prompt diff. Final text lives in /prompts/.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: How we'll know it worked
      description: Concrete tests or scenarios.
    validations:
      required: true
  - type: checkboxes
    id: dod
    attributes:
      label: Definition of done
      options:
        - label: Prompt file updated under /prompts/
        - label: Validated against named scenarios
        - label: agent-registry.md updated if behavior changed
