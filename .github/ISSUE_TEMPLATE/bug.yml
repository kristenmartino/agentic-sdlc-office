name: Bug
description: Something is broken or behaves incorrectly.
title: "[BUG] "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, version, anything relevant.
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - blocks demo / data loss
        - P1 - major feature broken
        - P2 - workaround exists
        - P3 - minor
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
